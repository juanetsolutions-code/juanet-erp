services:
  # Local Development Application Container
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: juanet-app:dev
    container_name: juanet-dev-app
    restart: unless-stopped
    working_dir: /var/www/html
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:JUANETEnterpriseSaaSPlatformKeyLocalDev84=
      APP_URL: http://localhost:8080
      DB_CONNECTION: pgsql
      DB_HOST: host.docker.internal # Connects to postgres container or host instance
      DB_PORT: 5432
      DB_DATABASE: postgres
      DB_USERNAME: postgres
      DB_PASSWORD: local_dev_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      FILESYSTEM_DISK: s3
      AWS_ACCESS_KEY_ID: juanet_local_key
      AWS_SECRET_ACCESS_KEY: juanet_local_secret
      AWS_DEFAULT_REGION: us-east-1
      AWS_BUCKET: juanet-local-bucket
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      AWS_ENDPOINT: http://minio:9000
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_ENCRYPTION: null
    volumes:
      - .:/var/www/html:delegated
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-custom.ini:ro
    networks:
      - juanet-dev-network
    depends_on:
      - redis
      - minio

  # Local Development Queue Worker
  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: juanet-app:dev
    container_name: juanet-dev-queue-worker
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --queue=default,high,low --tries=3 --timeout=60
    volumes:
      - .:/var/www/html:delegated
    networks:
      - juanet-dev-network
    depends_on:
      - app
      - redis

  # Local Development Cron Scheduler
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: juanet-app:dev
    container_name: juanet-dev-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan schedule:work
    volumes:
      - .:/var/www/html:delegated
    networks:
      - juanet-dev-network
    depends_on:
      - app
      - redis

  # Local Development Web Server (Nginx)
  web:
    image: nginx:1.27-alpine
    container_name: juanet-dev-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:delegated
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - juanet-dev-network
    depends_on:
      - app

  # Local Development Redis
  redis:
    image: redis:7.2-alpine
    container_name: juanet-dev-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - juanet-dev-redis-data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - juanet-dev-network

  # Local Development Object Storage (MinIO)
  minio:
    image: minio/minio:RELEASE.2024-06-06T09-36-42Z
    container_name: juanet-dev-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: juanet_local_key
      MINIO_ROOT_PASSWORD: juanet_local_secret
    volumes:
      - juanet-dev-minio-data:/data
    command: minio server /data --console-address ":9001"
    networks:
      - juanet-dev-network

  # Local Development MinIO Provisioner
  minio-create-buckets:
    image: minio/mc:RELEASE.2024-06-05T20-19-48Z
    container_name: juanet-dev-minio-provisioner
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set localminio http://minio:9000 juanet_local_key juanet_local_secret) do echo 'Waiting for MinIO...' && sleep 1; done;
      /usr/bin/mc mb --ignore-existing localminio/juanet-local-bucket;
      /usr/bin/mc anonymous set public localminio/juanet-local-bucket;
      exit 0;
      "
    networks:
      - juanet-dev-network

  # Local Development Mailbox Server (Mailpit)
  mailpit:
    image: axllent/mailpit:v1.18
    container_name: juanet-dev-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - juanet-dev-network

networks:
  juanet-dev-network:
    driver: bridge

volumes:
  juanet-dev-redis-data:
    driver: local
  juanet-dev-minio-data:
    driver: local
