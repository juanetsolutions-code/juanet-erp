server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    # UTF-8 Encoding
    charset utf-8;

    # Root Directory
    root /var/www/html/public;
    index index.php index.html;

    # Upload Limits (SaaS Platform requirements)
    client_max_body_size 100M;

    # Hide Nginx Version (Security)
    server_tokens off;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logging config (Docker-friendly stdout/stderr redirections)
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Optimize performance with system parameters
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Open File Cache
    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rss+xml
        application/vnd.geo+json
        application/vnd.ms-fontobject
        application/wasm
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/opentype
        image/bmp
        image/svg+xml
        image/x-icon
        text/cache-manifest
        text/css
        text/plain
        text/vcard
        text/vnd.rim.location.xloc
        text/vtt
        text/x-component
        text/x-cross-domain-policy;

    # Primary Laravel Router
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Static Assets Caching Optimization
    location ~* \.(?:css|js|woff2?|eot|ttf|otf|png|jpg|jpeg|gif|webp|svg|ico|pdf)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform, immutable";
        access_log off;
        log_not_found off;
        try_files $uri =404;
    }

    # PHP-FPM FastCGI Handler
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        
        # FastCGI Params Override
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param REQUEST_URI $request_uri;
        
        # Security: Protect against HTTP_PROXY vulnerability
        fastcgi_param HTTP_PROXY "";

        # FastCGI Buffering and Timeout Optimization
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 600;
        fastcgi_connect_timeout 60;
        fastcgi_send_timeout 600;
    }

    # Block sensitive system files and folders
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block direct access to critical software descriptors and storage directories
    location ~* \.(?:env|git|json|lock|config|yml|yaml|xml|log|sh|sql|sqlite|bak|swp)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* ^/(?:artisan|storage/app/|vendor/|node_modules/|bootstrap/cache/|database/|tests/|app/|config/) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Prevent directory listing globally
    autoindex off;
}
