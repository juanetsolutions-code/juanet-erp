# ==============================================================================
# JUANET Enterprise SaaS Platform - Redis 7.x Production Configuration
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. NETWORK & CONNECTION BINDINGS
# ------------------------------------------------------------------------------
# Bind to all network interfaces within the isolated Docker bridge network.
bind 0.0.0.0

# Disable protected mode as network isolation is enforced by Docker bridge networks.
# In public environments, firewalls or password auth (requirepass) must be enabled.
protected-mode no

# Listen on default port
port 6379

# TCP backlog for high concurrent connection handling (default: 511)
tcp-backlog 511

# Close the connection after a client is idle for N seconds (0 to disable timeout)
timeout 0

# Keepalive interval to detect dead TCP sockets (in seconds)
tcp-keepalive 300

# ------------------------------------------------------------------------------
# 2. GENERAL CONFIGURATIONS
# ------------------------------------------------------------------------------
# Run in foreground inside Docker container
daemonize no

# Do not supervise processes
supervised no

# Severity level of logs: debug, verbose, notice, warning
loglevel notice

# Log to stdout (Docker collects this automatically)
logfile ""

# Enable standard databases count
databases 16

# ------------------------------------------------------------------------------
# 3. PERFORMANCE & SYSTEM TUNING
# ------------------------------------------------------------------------------
# Number of I/O threads to process requests in parallel. Highly recommended for
# multi-core database machines.
io-threads 4
io-threads-do-reads yes

# Dynamic Hz adapts the database processing loop frequency depending on traffic
hz 10
dynamic-hz yes

# Active memory defragmentation to reclaim fragmented memory without restarts
activedefrag yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 30

# ------------------------------------------------------------------------------
# 4. PERSISTENCE MECHANISMS (RDB + AOF)
# ------------------------------------------------------------------------------
# Enable standard snapshotting (RDB) as safety fallbacks
save 900 1
save 300 10
save 60 10000

# Do not stop database writes if background snapshotting fails
stop-writes-on-bgsave-error no

# Compress RDB string objects using LZF compression
rdbcompression yes

# Add CRC64 checksum at the end of the payload for integrity checks
rdbchecksum yes

# The filename and target storage directory
dbfilename dump.rdb
dir /data

# Enable Append Only File (AOF) for high-frequency writes durability (ideal for queues)
appendonly yes
appendfilename "appendonly.aof"
appenddirname "appendonlydir"

# Force sync write buffers to disk once every second (ideal trade-off)
appendfsync everysec

# Do not run fsync during active background saves or rewrite processes to avoid disk bottleneck
no-appendfsync-on-rewrite yes

# Auto AOF rewrite triggers
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Enable hybrid AOF-RDB loading for fast startup speeds
aof-use-rdb-preamble yes

# ------------------------------------------------------------------------------
# 5. MEMORY MANAGEMENT & EVICTION POLICY
# ------------------------------------------------------------------------------
# Set memory cap to 512MB for local development (increase on production VPS)
maxmemory 512mb

# Eviction Policy: 'noeviction' is MANDATORY for Laravel queue workers to
# prevent accidental job loss when memory limits are reached. Cache-only
# servers should use 'allkeys-lru'.
maxmemory-policy noeviction

# ------------------------------------------------------------------------------
# 6. LAZY FREEING (Asynchronous non-blocking deletions)
# ------------------------------------------------------------------------------
# Reclaim memory in background threads for large object deletions to avoid blocks
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush yes
lazyfree-lazy-user-del yes
lazyfree-lazy-user-flush yes

# ------------------------------------------------------------------------------
# 7. CLIENT BUFFER LIMITS
# ------------------------------------------------------------------------------
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60
